spring.application.name=bobacom

logging.level.root=info
logging.level.com.bobacom=debug

logging.pattern.console= %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n

spring.datasource.url=jdbc:h2:mem:boba;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update



lang=IT

credito.valoreDefault = 10
credito.secret = segreto